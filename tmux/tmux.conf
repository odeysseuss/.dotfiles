# set prefix key
unbind c-b
set -g prefix c-a

set -g default-terminal "screen-256color"
set -ga terminal-overrides ',xterm-256color:tc'
set -g mouse on
set -g set-clipboard on
set -g status-interval 5
set -g detach-on-destroy off
set -s escape-time 0
set -g renumber-windows on
set -g base-index 1
setw -g mode-keys vi

# get those yellow colors out
set -g message-style "bg=#0d0c0c,fg=#8ba4b0,bold"
set -g mode-style "bg=#0d0c0c,fg=#8ba4b0,bold"

# theme: borders
set -g pane-border-style "fg=#0d0c0c"
set -g pane-active-border-style "fg=#8a9a7b"

# theme: status bar
set -g status-style "bg=#0d0c0c,fg=#8ba4b0,bold"
set -g status-left ""
set -g status-right " [#S] "

# theme: status(windows)
set -g window-status-format " #I:#W "
set -g window-status-current-format " ● #W "
set -g window-status-current-style "#{?window_zoomed_flag,bg=#1d2021,bold,bg=#1d2021,bold}"

# pane switching with awareness of neovim splits
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqe '^[^txz ]+ +(\\s+/)?g?\\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# remaps
unbind r
bind r source-file ~/.tmux.conf
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

unbind x
bind x kill-pane
bind m resize-pane -Z
bind c new-window -c "#{pane_current_path}"
bind f run-shell "tmux neww $dotfiles/scripts/workflow/tmux-sessionizer.sh"
bind l run-shell "tmux split-window -h -c '#{pane_current_path}'"
bind j run-shell "tmux split-window -v -c '#{pane_current_path}'"
bind b display-popup -w 80% -h 70% -e "btop"
bind h display-popup -e "tmux list-sessions | sed -e 's/:.*$//' | \
                        grep -v \"^$(tmux display-message -p '#s')\$\" | \
                        fzf --reverse | xargs tmux switch-client -t"

run-shell $HOME/tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell $HOME/tmux/plugins/tmux-continuum/continuum.tmux

set -g @continuum-restore "on"
